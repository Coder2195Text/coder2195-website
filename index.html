<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="description" content="Welcome to my website!" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Coder2195's Website</title>
    <link rel="icon" href="img/logo.ico" />
    <link rel="stylesheet" href="../css/main.css" />
    <script src="../scripts/jquery.js"></script>
  </head>
  <body>
    <script>
      $("body").css("visibility", "hidden");
    </script>
    <div id="settings">
      <img
        src="/img/settings.png"
        alt="music"
        height="60px"
        width="60px"
        id="setting-icon"
      />
      <div id="setting-content">
        <img src="/img/sound.png" alt="music" height="48px" width="48px" />
        <br />
        <select id="music-select">
          <option value="" id="no-music"></option>
          <option
            value="../snd/coffindance.mp3"
            id="coffindance-music"
          ></option>
          <option value="../snd/calm.mp3" id="calm-music"></option>
          <option value="custom-music" id="custom-music"></option>
        </select>
        <hr />
        <img
          src="/img/language.png"
          alt="language"
          height="48px"
          width="48px"
        /><br />
        <select id="lang-select">
          <option value="en">English</option>
          <option value="ch">中文</option>
          <option value="fr">Français</option>
          <option value="sp">Español</option>
          <option value="pt">Portugues</option>
          <option value="nl">Nederlands</option>
          <option value="de">Deutsche</option>
          <option value="ar">عربى</option>
          <option value="ru">русский</option>
          <option value="ko">한국어</option>
          <option value="jp">日本語</option>
          <option value="hi">हिंदी</option>
          <option value="el">Ελληνικά</option>
        </select>
        <hr />
      </div>
    </div>
    <div id="home">
      <h1 id="home-title">
        <div></div>
      </h1>
      <a id="home-snap" href="javascript: null"></a>
      <br />
      <a id="home-python"></a>
    </div>
    <div id="snap">
      3
    </div>
    <div id="python">
      4
    </div>
    <div id="other">
      5
    </div>
    <div id="bar">
      6
    </div>
  </body>
  <script type="module" src="../scripts/main.js"></script>
</html>
